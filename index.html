<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Gamer - Tu Tienda Digital</title>
    <!-- Fuente moderna desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS DE DISEÑO (CSS) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: #0b0f1a; /* Fondo oscuro tipo gaming */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Botón estilo WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
        }

        /* Pequeño adorno para el fondo */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(58, 123, 213, 0.2);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            top: 20%;
            left: 30%;
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container">
        <h1>Digital Gamer</h1>
        <p>Los mejores servicios de Streaming y Gaming al mejor precio del mercado.</p>
        
        <!-- REEMPLAZA EL NÚMERO: Pon tu número después del 54 (sin el +) -->
        <a href="https://wa.me/5491123456789?text=Hola!%20Quiero%20info%20de%20los%20servicios" class="btn-whatsapp">
            📱 Contactar por WhatsApp
        </a>
    </div>

</body>
</html>
